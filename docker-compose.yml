services:
  simoge-mcp:
    image: simoge-mcp:latest
    build:
      context: .
      network: host
      args:
        GITEA_TOKEN: ${MCP_GITEA_TOKEN}
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    networks:
      shared:
        aliases:
          - simoge-mcp
    expose:
      - "8099"
    env_file: .env
    environment:
      SSH_AUTH_SOCK: /run/user/1000/ssh-agent.sock
    volumes:
      - /data/massimiliano:/data/massimiliano:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/massimiliano/.ssh:/home/massimiliano/.ssh:ro
    mem_limit: 1g
    memswap_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8099/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

networks:
  shared:
    external: true
