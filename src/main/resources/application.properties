# === CRITICO PER STDIO ===
spring.main.web-application-type=none
spring.main.banner-mode=off
logging.pattern.console=
logging.file.name=./logs/mcp-server.log
logging.level.root=INFO
logging.level.com.example.mcp=DEBUG

# === Virtual Threads (Java 21) ===
spring.threads.virtual.enabled=true

# === MCP Server ===
spring.ai.mcp.server.type=ASYNC
spring.ai.mcp.server.name=mcp-server
spring.ai.mcp.server.version=0.0.2

# === Database SQL (attivo se MCP_SQL_ENABLED=true) ===
mcp.sql.enabled=${MCP_SQL_ENABLED:true}
spring.datasource.url=${MCP_DB_URL:jdbc:h2:file:./data/mcpdb;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${MCP_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${MCP_DB_USER:sa}
spring.datasource.password=${MCP_DB_PASSWORD:}
spring.sql.init.mode=${MCP_DB_INIT_MODE:always}
mcp.db.schema=${MCP_DB_SCHEMA:PUBLIC}

# === Multi-DB SQL (opzionale - se vuoto usa singolo datasource sopra) ===
# Lista nomi DB separati da virgola. Per ogni nome servono env vars:
# MCP_DB_{NOME}_URL, MCP_DB_{NOME}_DRIVER, MCP_DB_{NOME}_USER, MCP_DB_{NOME}_PASSWORD
mcp.db.names=${MCP_DB_NAMES:}

# === File System (attivo se MCP_FILESYSTEM_ENABLED=true, default ON) ===
mcp.filesystem.enabled=${MCP_FILESYSTEM_ENABLED:true}
mcp.fs.basedir=${MCP_FS_BASEDIR:C:/NoCloud}

# === API proxy base URL ===
mcp.api.baseurl=${MCP_API_BASEURL:http://localhost:8080}

# === Azure DevOps (attivo se MCP_DEVOPS_PAT e' impostato) ===
mcp.devops.organization=${MCP_DEVOPS_ORG:}
mcp.devops.project=${MCP_DEVOPS_PROJECT:}
mcp.devops.team=${MCP_DEVOPS_TEAM:}
mcp.devops.pat=${MCP_DEVOPS_PAT:}
mcp.devops.api-version=7.1

# === MongoDB (attivo se MCP_MONGO_ENABLED=true) ===
mcp.mongo.enabled=${MCP_MONGO_ENABLED:false}
spring.data.mongodb.uri=${MCP_MONGO_URI:mongodb://localhost:27017/mcp}

# === Multi-MongoDB (opzionale - se vuoto usa singola istanza sopra) ===
# Lista nomi istanze MongoDB separati da virgola.
# Per ogni nome serve: MCP_MONGO_{NOME}_URI
mcp.mongo.names=${MCP_MONGO_NAMES:}

# === OpenShift (attivo se MCP_OCP_TOKEN e' impostato) ===
mcp.ocp.server=${MCP_OCP_SERVER:}
mcp.ocp.token=${MCP_OCP_TOKEN:}
mcp.ocp.skip-tls-verify=${MCP_OCP_SKIP_TLS_VERIFY:false}
mcp.ocp.namespace=${MCP_OCP_NAMESPACE:}

# === Docker (attivo se MCP_DOCKER_HOST e' impostato) ===
mcp.docker.host=${MCP_DOCKER_HOST:}
mcp.docker.tls-verify=${MCP_DOCKER_TLS_VERIFY:true}
mcp.docker.cert-path=${MCP_DOCKER_CERT_PATH:}
mcp.docker.api-version=${MCP_DOCKER_API_VERSION:v1.45}

# === Jira Cloud (attivo se MCP_JIRA_API_TOKEN e' impostato) ===
mcp.jira.base-url=${MCP_JIRA_BASE_URL:}
mcp.jira.email=${MCP_JIRA_EMAIL:}
mcp.jira.api-token=${MCP_JIRA_API_TOKEN:}

# === Vector Search / Embeddings (attivo se MCP_VECTOR_ENABLED=true) ===
mcp.vector.enabled=${MCP_VECTOR_ENABLED:false}
mcp.vector.provider=${MCP_VECTOR_PROVIDER:ollama}
mcp.vector.dimensions=${MCP_VECTOR_DIMENSIONS:768}
mcp.vector.db-url=${MCP_VECTOR_DB_URL:jdbc:postgresql://localhost:5432/embeddings}
mcp.vector.db-username=${MCP_VECTOR_DB_USER:postgres}
mcp.vector.db-credential=${MCP_VECTOR_DB_CREDENTIAL:}
mcp.vector.conversations-path=${MCP_VECTOR_CONVERSATIONS_PATH:}
mcp.vector.docs-path=${MCP_VECTOR_DOCS_PATH:}
# Provider: Ollama (default)
mcp.vector.ollama-base-url=${MCP_VECTOR_OLLAMA_BASE_URL:http://ollama:11434}
mcp.vector.ollama-model=${MCP_VECTOR_OLLAMA_MODEL:nomic-embed-text}
# Provider: ONNX (all-MiniLM-L6-v2, 384 dim, in-process)
mcp.vector.onnx-model-cache-dir=${MCP_VECTOR_ONNX_MODEL_CACHE:/tmp/onnx-models}
# Provider: OpenAI-compatible
mcp.vector.openai-base-url=${MCP_VECTOR_OPENAI_BASE_URL:https://api.openai.com}
mcp.vector.openai-api-key=${MCP_VECTOR_OPENAI_API_KEY:}
mcp.vector.openai-model=${MCP_VECTOR_OPENAI_MODEL:text-embedding-3-small}
# === Graph DB (attivo se MCP_GRAPH_ENABLED=true) ===
mcp.graph.enabled=${MCP_GRAPH_ENABLED:false}
mcp.graph.neo4j-uri=${MCP_GRAPH_NEO4J_URI:bolt://neo4j:7687}
mcp.graph.neo4j-username=${MCP_GRAPH_NEO4J_USER:neo4j}
mcp.graph.neo4j-password=${MCP_GRAPH_NEO4J_PASSWORD:}
mcp.graph.age-enabled=${MCP_GRAPH_AGE_ENABLED:false}
mcp.graph.age-db-url=${MCP_GRAPH_AGE_DB_URL:}
mcp.graph.age-db-username=${MCP_GRAPH_AGE_DB_USER:}
mcp.graph.age-db-password=${MCP_GRAPH_AGE_DB_PASSWORD:}
mcp.graph.age-graph-name=${MCP_GRAPH_AGE_GRAPH_NAME:knowledge_graph}

# === Embeddings legacy (attivo se MCP_EMBEDDINGS_ENABLED=true) ===
mcp.embeddings.enabled=${MCP_EMBEDDINGS_ENABLED:false}

# === Playwright Browser Automation (attivo se MCP_PLAYWRIGHT_ENABLED=true) ===
mcp.playwright.enabled=${MCP_PLAYWRIGHT_ENABLED:false}
mcp.playwright.browser-type=${MCP_PLAYWRIGHT_BROWSER:chromium}
mcp.playwright.headless=${MCP_PLAYWRIGHT_HEADLESS:true}
mcp.playwright.timeout=${MCP_PLAYWRIGHT_TIMEOUT:30000}
mcp.playwright.viewport-width=${MCP_PLAYWRIGHT_VIEWPORT_WIDTH:1280}
mcp.playwright.viewport-height=${MCP_PLAYWRIGHT_VIEWPORT_HEIGHT:720}
mcp.playwright.locale=${MCP_PLAYWRIGHT_LOCALE:it-IT}
