# Profilo SSE: sovrascrive web-application-type=none del profilo base
# Attivato da SPRING_PROFILES_ACTIVE=sse nel container Docker
# Usa reactive (Netty) per McpWebFluxServerAutoConfiguration con WebFluxSseServerTransportProvider
spring.main.web-application-type=reactive
server.port=8099

# Disabilita init SQL (schema.sql e' H2, non compatibile con PostgreSQL)
spring.sql.init.mode=never

# SSE keepalive: ping periodico alle sessioni attive.
# Quando il server si riavvia, il flusso di ping si interrompe e il client riconnette automaticamente.
# Senza questo, le sessioni SSE diventano stale dopo un restart e le tool call tornano vuote.
# Prefix: @ConfigurationProperties("spring.ai.mcp.server") — NON "spring.ai.mcp.server.sse"
spring.ai.mcp.server.keep-alive-interval=15s

# Build version: iniettata da BUILD_VERSION env (sol deploy → Dockerfile ARG)
spring.ai.mcp.server.version=${BUILD_VERSION:0.0.4}

# Ripristina output console per docker logs (disabilitato nel profilo base per STDIO)
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z'} %5p --- [%t] %-40.40logger{39} : %m%n
logging.file.name=
