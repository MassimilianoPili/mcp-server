# HTTP Streamable transport (sostituisce SSE)
# Attivato da SPRING_PROFILES_ACTIVE=streamable nel container Docker
# Usa reactive (Netty) per McpServerStreamableHttpWebFluxAutoConfiguration
spring.main.web-application-type=reactive
server.port=8099

# Disabilita init SQL (schema.sql e' H2, non compatibile con PostgreSQL)
spring.sql.init.mode=never

# Transport selection: HTTP Streamable (MCP spec 2025-11-25)
# Endpoint unico /mcp per GET (SSE stream), POST (JSON-RPC), DELETE (close session)
# Session ID via header Mcp-Session-Id
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
spring.ai.mcp.server.streamable-http.keep-alive-interval=30s

# Ripristina output console per docker logs (disabilitato nel profilo base per STDIO)
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z'} %5p --- [%t] %-40.40logger{39} : %m%n
logging.file.name=
