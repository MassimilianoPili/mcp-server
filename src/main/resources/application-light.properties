# Profilo "light": disabilita tutti i tool per startup veloce.
# Avvio: java -jar mcp-server.jar --spring.profiles.active=light
# Rimangono attivi solo tool con credenziali configurate (devops, ocp, docker, jira).

mcp.sql.enabled=false
mcp.mongo.enabled=false
mcp.vector.enabled=false
mcp.graph.enabled=false
mcp.embeddings.enabled=false
mcp.filesystem.enabled=false
mcp.playwright.enabled=false
